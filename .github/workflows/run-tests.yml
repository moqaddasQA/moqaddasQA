name: QA Smoke Tests

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  push:
    paths:
      - 'qa-tests/**'
  workflow_dispatch:

jobs:
  qa-smoke:
    runs-on: ubuntu-latest
    name: Run QA Framework Smoke Tests

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run smoke tests
        run: mvn test --no-transfer-progress -f qa-tests/pom.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: qa-tests/target/surefire-reports/
          retention-days: 7
