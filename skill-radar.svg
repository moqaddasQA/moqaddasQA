<svg xmlns="http://www.w3.org/2000/svg" width="550" height="420" viewBox="0 0 550 420">
  <defs>
    <!-- Glow filter for skill polygon -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .skill-label { font-family: 'Courier New', Courier, monospace; font-size: 12px; fill: #94a3b8; }
      .skill-pct   { font-family: 'Courier New', Courier, monospace; font-size: 11px; font-weight: bold; fill: #58b9ff; }
      .chart-title { font-family: 'Courier New', Courier, monospace; font-size: 16px; fill: #e2e8f0; }
      .chart-sub   { font-family: 'Courier New', Courier, monospace; font-size: 11px; fill: #64748b; }
      .grid-label  { font-family: 'Courier New', Courier, monospace; font-size: 9px; fill: #334155; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="550" height="420" rx="12" fill="#0f172a"/>
  <rect x="1" y="1" width="548" height="418" rx="11" fill="none" stroke="#1e293b" stroke-width="1"/>

  <!-- Title -->
  <text x="275" y="30" text-anchor="middle" class="chart-title">Skill Radar</text>
  <text x="275" y="46" text-anchor="middle" class="chart-sub">QA Engineering Competency Map</text>

  <!-- ── Grid rings (center 275,225, maxR=140) ── -->
  <!-- 20% ring r=28 -->
  <polygon points="275,197 299.3,211 299.3,239 275,253 250.7,239 250.7,211"
           fill="none" stroke="#1e293b" stroke-width="1"/>
  <!-- 40% ring r=56 -->
  <polygon points="275,169 323.5,197 323.5,253 275,281 226.5,253 226.5,197"
           fill="none" stroke="#1e293b" stroke-width="1"/>
  <!-- 60% ring r=84 -->
  <polygon points="275,141 347.7,183 347.7,267 275,309 202.3,267 202.3,183"
           fill="none" stroke="#1e293b" stroke-width="1"/>
  <!-- 80% ring r=112 -->
  <polygon points="275,113 372,169 372,281 275,337 178,281 178,169"
           fill="none" stroke="#334155" stroke-width="1"/>
  <!-- 100% ring r=140 -->
  <polygon points="275,85 396.2,155 396.2,295 275,365 153.8,295 153.8,155"
           fill="none" stroke="#334155" stroke-width="1.5"/>

  <!-- Grid % labels -->
  <text x="278" y="251" class="grid-label">20%</text>
  <text x="278" y="279" class="grid-label">40%</text>
  <text x="278" y="307" class="grid-label">60%</text>
  <text x="278" y="335" class="grid-label">80%</text>

  <!-- Axis lines from center (275,225) to vertices -->
  <line x1="275" y1="225" x2="275" y2="85"   stroke="#1e293b" stroke-width="1"/>
  <line x1="275" y1="225" x2="396.2" y2="155" stroke="#1e293b" stroke-width="1"/>
  <line x1="275" y1="225" x2="396.2" y2="295" stroke="#1e293b" stroke-width="1"/>
  <line x1="275" y1="225" x2="275" y2="365"   stroke="#1e293b" stroke-width="1"/>
  <line x1="275" y1="225" x2="153.8" y2="295" stroke="#1e293b" stroke-width="1"/>
  <line x1="275" y1="225" x2="153.8" y2="155" stroke="#1e293b" stroke-width="1"/>

  <!-- ── Skill polygon (draw-in animation then fill) ──
       Skills: Auto 95%, Java 90%, BDD 95%, API 88%, CICD 70%, Compliance 85%
       r = pct * 140
       0°  top:    (275, 225-133) = (275,92)      ← Automation 95%
       60° tr:     (275+109.1, 225-63) = (384.1,162) ← Java 90%
       120° br:    (275+115.2, 225+66.5)=(390.2,291.5) ← BDD 95%
       180° bot:   (275, 225+123.2)=(275,348.2)   ← API 88%
       240° bl:    (275-84.9, 225+49)=(190.1,274)  ← CICD 70%
       300° tl:    (275-103.1, 225-59.5)=(171.9,165.5) ← Compliance 85%
  -->
  <polygon id="skill-poly"
           points="275,92 384.1,162 390.2,291.5 275,348.2 190.1,274 171.9,165.5"
           fill="#3b82f6" fill-opacity="0" stroke="#58b9ff" stroke-width="2.5"
           stroke-dasharray="750" stroke-dashoffset="750" filter="url(#glow)">
    <!-- Stroke draws in over 2.5s -->
    <animate attributeName="stroke-dashoffset" from="750" to="0" dur="2.5s" begin="0.6s" fill="freeze"/>
    <!-- Fill fades in after stroke -->
    <animate attributeName="fill-opacity" from="0" to="0.2" dur="1.5s" begin="2.8s" fill="freeze"/>
  </polygon>

  <!-- ── Skill vertex dots (pop in sequentially) ── -->
  <circle cx="275"   cy="92"    r="0" fill="#58b9ff">
    <animate attributeName="r" values="0;7;5" dur="0.4s" begin="0.8s" fill="freeze"/>
  </circle>
  <circle cx="384.1" cy="162"   r="0" fill="#58b9ff">
    <animate attributeName="r" values="0;7;5" dur="0.4s" begin="1.2s" fill="freeze"/>
  </circle>
  <circle cx="390.2" cy="291.5" r="0" fill="#58b9ff">
    <animate attributeName="r" values="0;7;5" dur="0.4s" begin="1.6s" fill="freeze"/>
  </circle>
  <circle cx="275"   cy="348.2" r="0" fill="#58b9ff">
    <animate attributeName="r" values="0;7;5" dur="0.4s" begin="2.0s" fill="freeze"/>
  </circle>
  <circle cx="190.1" cy="274"   r="0" fill="#58b9ff">
    <animate attributeName="r" values="0;7;5" dur="0.4s" begin="2.4s" fill="freeze"/>
  </circle>
  <circle cx="171.9" cy="165.5" r="0" fill="#58b9ff">
    <animate attributeName="r" values="0;7;5" dur="0.4s" begin="2.8s" fill="freeze"/>
  </circle>

  <!-- ── Skill labels ── -->
  <!-- Top: Test Automation 95% -->
  <text x="275" y="68" text-anchor="middle" class="skill-label">Test Automation</text>
  <text x="275" y="81" text-anchor="middle" class="skill-pct">95%</text>

  <!-- Top-right: Java / OOP 90% -->
  <text x="410" y="158" text-anchor="start" class="skill-label">Java / OOP</text>
  <text x="410" y="171" text-anchor="start" class="skill-pct">90%</text>

  <!-- Bottom-right: BDD / Cucumber 95% -->
  <text x="410" y="290" text-anchor="start" class="skill-label">BDD / Cucumber</text>
  <text x="410" y="303" text-anchor="start" class="skill-pct">95%</text>

  <!-- Bottom: API Testing 88% -->
  <text x="275" y="380" text-anchor="middle" class="skill-label">API Testing</text>
  <text x="275" y="393" text-anchor="middle" class="skill-pct">88%</text>

  <!-- Bottom-left: CI/CD 70% -->
  <text x="132" y="290" text-anchor="end" class="skill-label">CI / CD</text>
  <text x="132" y="303" text-anchor="end" class="skill-pct">70%</text>

  <!-- Top-left: Compliance 85% -->
  <text x="132" y="158" text-anchor="end" class="skill-label">Compliance</text>
  <text x="132" y="171" text-anchor="end" class="skill-pct">85%</text>

  <!-- Center dot -->
  <circle cx="275" cy="225" r="3" fill="#334155"/>
</svg>
